# ============================================================
# FLUX.2-klein-9B 推理服务 — Docker Compose
# ============================================================
# 启动：docker compose up -d
# 查看日志：docker compose logs -f
# 停止：docker compose down
#
# 首次启动会自动从 ModelScope/HuggingFace 下载模型（~18GB）

services:
  flux-klein9b:
    build: .
    container_name: flux-klein9b-server
    image: flux-klein9b-server:latest
    restart: unless-stopped

    ports:
      - "5500:5500"

    # GPU 直通（需要 nvidia-container-toolkit）
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    environment:
      # 模型来源：modelscope（国内）| huggingface（需镜像）
      - FLUX_MODEL_SOURCE=modelscope
      # HuggingFace 镜像（国内加速）
      - HF_ENDPOINT=https://hf-mirror.com
      # 模型缓存
      - MODELSCOPE_CACHE=/data/models
      - HF_HOME=/data/huggingface
      # 显存优化
      - FLUX_CPU_OFFLOAD=false
      - FLUX_MAX_CONCURRENT=1
      # 可选：HuggingFace Token
      # - HF_TOKEN=${HF_TOKEN}

    volumes:
      # ModelScope 模型缓存（首次下载 ~18GB）
      - ./data/models:/data/models
      # HuggingFace 缓存
      - ./data/huggingface:/data/huggingface
      # 生成的图片（可选持久化）
      - ./data/images:/data/flux-images

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
